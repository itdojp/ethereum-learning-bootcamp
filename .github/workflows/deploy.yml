name: deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network (testnet-first)"
        required: true
        type: choice
        default: sepolia
        options:
          - sepolia
          - optimismSepolia
          - mainnet
          - optimism
      contract:
        description: "Solidity contract identifier"
        required: true
        type: string
        default: Hello
      args_json:
        description: 'Constructor arguments as a JSON array, for example ["1000000000000000000000000"]'
        required: true
        type: string
        default: "[]"
      production_confirmation:
        description: "For mainnet/optimism only: enter DEPLOY_PRODUCTION exactly"
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read
  deployments: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate and test deployment
    runs-on: ubuntu-latest
    outputs:
      network: ${{ steps.inputs.outputs.network }}
      environment: ${{ steps.inputs.outputs.environment }}
      contract: ${{ steps.inputs.outputs.contract }}
      args_json: ${{ steps.inputs.outputs.args_json }}
      rpc_secret_name: ${{ steps.inputs.outputs.rpc_secret_name }}
      private_key_secret_name: ${{ steps.inputs.outputs.private_key_secret_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '20'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate untrusted workflow inputs
        id: inputs
        env:
          INPUT_NETWORK: ${{ inputs.network }}
          INPUT_CONTRACT: ${{ inputs.contract }}
          INPUT_ARGS_JSON: ${{ inputs.args_json }}
          INPUT_PRODUCTION_CONFIRMATION: ${{ inputs.production_confirmation }}
        run: node tools/validate-deploy-inputs.cjs

      - name: Test input boundary
        run: npm run test:deploy-inputs

      - name: Check toolchain
        run: npm run check:toolchain

      - name: Test contracts
        run: npm test

      - name: Compile contracts
        run: npx hardhat compile

  deploy:
    name: Deploy to validated network
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate.outputs.environment }}
    concurrency:
      group: deploy-${{ needs.validate.outputs.network }}
      cancel-in-progress: false
    env:
      TARGET_NETWORK: ${{ needs.validate.outputs.network }}
      CONTRACT: ${{ needs.validate.outputs.contract }}
      ARGS_JSON: ${{ needs.validate.outputs.args_json }}
    steps:
      - name: Checkout validated revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '20'
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify GitHub Environment protection
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/check-deployment-environment.cjs

      - name: Revalidate normalized inputs
        env:
          INPUT_NETWORK: ${{ needs.validate.outputs.network }}
          INPUT_CONTRACT: ${{ needs.validate.outputs.contract }}
          INPUT_ARGS_JSON: ${{ needs.validate.outputs.args_json }}
          INPUT_PRODUCTION_CONFIRMATION: DEPLOY_PRODUCTION
        run: node tools/validate-deploy-inputs.cjs

      - name: Compile contracts
        run: npx hardhat compile

      - name: Deploy
        shell: bash
        env:
          RPC_URL: ${{ secrets[needs.validate.outputs.rpc_secret_name] }}
          PRIVATE_KEY: ${{ secrets[needs.validate.outputs.private_key_secret_name] }}
        run: |
          set -euo pipefail
          [[ "$RPC_URL" =~ ^https://[^[:space:]]+$ ]] || { echo "RPC_URL must be a non-empty HTTPS URL in the selected GitHub Environment" >&2; exit 1; }
          [[ "$PRIVATE_KEY" =~ ^0x[0-9a-fA-F]{64}$ ]] || { echo "PRIVATE_KEY must be one 0x-prefixed 32-byte key in the selected GitHub Environment" >&2; exit 1; }
          case "$TARGET_NETWORK" in
            sepolia) rpc_name=SEPOLIA_RPC_URL ;;
            optimismSepolia) rpc_name=OPTIMISM_SEPOLIA_RPC_URL ;;
            mainnet) rpc_name=MAINNET_RPC_URL ;;
            optimism) rpc_name=OPTIMISM_RPC_URL ;;
            *) echo "Unexpected validated network" >&2; exit 1 ;;
          esac
          export "$rpc_name=$RPC_URL"
          unset RPC_URL
          npx hardhat run scripts/deploy-generic.ts --network "$TARGET_NETWORK"
