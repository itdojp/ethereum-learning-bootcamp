name: test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:metadata
      - run: npm run check:toolchain
      - run: npm run check:dependency-compat
      - run: npm run test:deploy-inputs
      - run: npm run test:deployment-environment
      - run: npm run test:public-site
      - run: npm run check:deploy-safety
      - run: npm run check:docs-consistency
      - run: npm test
      - run: npm run check:links
      - run: npm run check:md-style
      - run: npm run check:security

  dapp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dapp/package-lock.json
      - name: Install (dapp)
        working-directory: dapp
        run: npm ci
      - name: Build (dapp)
        working-directory: dapp
        run: npm run build
