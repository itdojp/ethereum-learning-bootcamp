[profile.default]
src = "contracts"
test = "test"
out = "out"
cache_path = "cache/foundry"
libs = ["node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=node_modules/@openzeppelin/"]

[invariant]
runs = 128
depth = 32
fail_on_revert = true
show_metrics = true

[profile.negative]
test = "test-negative"
out = "out-negative"
cache_path = "cache/foundry-negative"
